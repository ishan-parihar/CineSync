name: Performance & Testing CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run performance tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18'
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  # Linting and Type Checking
  lint-and-type-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-ui/frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd web-ui/frontend
        npm ci
        
    - name: Run ESLint
      run: |
        cd web-ui/frontend
        npm run lint
        
    - name: Run Prettier check
      run: |
        cd web-ui/frontend
        npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css,md}"
        
    - name: Type check
      run: |
        cd web-ui/frontend
        npm run type-check

  # Unit and Integration Tests
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16, 18, 20]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: web-ui/frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd web-ui/frontend
        npm ci
        
    - name: Run tests with coverage
      run: |
        cd web-ui/frontend
        npm run test:coverage
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        directory: web-ui/frontend/coverage
        flags: frontend
        name: frontend-coverage

  # E2E Tests with Cypress
  e2e-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-ui/frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd web-ui/frontend
        npm ci
        
    - name: Build application
      run: |
        cd web-ui/frontend
        npm run build
        
    - name: Start application
      run: |
        cd web-ui/frontend
        npm start &
        sleep 10
        
    - name: Run Cypress tests
      uses: cypress-io/github-action@v6
      with:
        working-directory: web-ui/frontend
        wait-on: 'http://localhost:3000'
        wait-on-timeout: 120
        browser: chrome
        record: true
      env:
        CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Visual Regression Tests
  visual-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-ui/frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd web-ui/frontend
        npm ci
        
    - name: Install Playwright browsers
      run: |
        cd web-ui/frontend
        npx playwright install --with-deps
        
    - name: Build application
      run: |
        cd web-ui/frontend
        npm run build
        
    - name: Run Playwright tests
      run: |
        cd web-ui/frontend
        npx playwright test
        
    - name: Upload Playwright report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: web-ui/frontend/playwright-report/
        retention-days: 30

  # Performance Tests with Lighthouse CI
  performance-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-ui/frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd web-ui/frontend
        npm ci
        
    - name: Build application
      run: |
        cd web-ui/frontend
        npm run build
        
    - name: Start application
      run: |
        cd web-ui/frontend
        npm start &
        sleep 15
        
    - name: Run Lighthouse CI
      run: |
        cd web-ui/frontend
        npm install -g @lhci/cli@0.12.x
        lhci autorun
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        
    - name: Upload Lighthouse results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: lighthouse-results
        path: web-ui/frontend/.lighthouseci/
        retention-days: 30

  # Bundle Analysis
  bundle-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-ui/frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd web-ui/frontend
        npm ci
        
    - name: Analyze bundle
      run: |
        cd web-ui/frontend
        npm run build:analyze
        
    - name: Check bundle size
      run: |
        cd web-ui/frontend
        npx bundlesize
        
    - name: Upload bundle analysis
      uses: actions/upload-artifact@v3
      with:
        name: bundle-analysis
        path: web-ui/frontend/.next/analyze/
        retention-days: 30

  # Accessibility Tests
  accessibility-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-ui/frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd web-ui/frontend
        npm ci
        
    - name: Build application
      run: |
        cd web-ui/frontend
        npm run build
        
    - name: Run accessibility tests
      run: |
        cd web-ui/frontend
        npm run test:accessibility
        
    - name: Upload accessibility report
      uses: actions/upload-artifact@v3
      with:
        name: accessibility-report
        path: web-ui/frontend/accessibility-report/
        retention-days: 30

  # Security Audit
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-ui/frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd web-ui/frontend
        npm ci
        
    - name: Run security audit
      run: |
        cd web-ui/frontend
        npm audit --audit-level=moderate
        
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

  # Performance Regression Detection
  performance-regression:
    runs-on: ubuntu-latest
    needs: performance-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history for comparison
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: web-ui/frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd web-ui/frontend
        npm ci
        
    - name: Compare performance with baseline
      run: |
        cd web-ui/frontend
        # Script to compare current performance with baseline
        node scripts/compare-performance.js
        
    - name: Comment PR with performance results
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const path = 'web-ui/frontend/performance-results.json';
          
          if (fs.existsSync(path)) {
            const results = JSON.parse(fs.readFileSync(path, 'utf8'));
            
            const comment = `
            ## 🚀 Performance Test Results
            
            ### Core Web Vitals
            - **FCP**: ${results.fcp}ms ${results.fcp > 2000 ? '⚠️' : '✅'}
            - **LCP**: ${results.lcp}ms ${results.lcp > 2500 ? '⚠️' : '✅'}
            - **CLS**: ${results.cls} ${results.cls > 0.1 ? '⚠️' : '✅'}
            - **FID**: ${results.fid}ms ${results.fid > 100 ? '⚠️' : '✅'}
            
            ### Bundle Size
            - **Total**: ${results.bundleSize}KB ${results.bundleSize > 244 ? '⚠️' : '✅'}
            
            ${results.regressions.length > 0 ? `
            ### 🚨 Performance Regressions Detected
            ${results.regressions.map(reg => `- ${reg.metric}: ${reg.change}%`).join('\n')}
            ` : '### ✅ No performance regressions detected'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  # Deploy to staging (on develop branch)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test, e2e-test, visual-test, performance-test]
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here
        
    - name: Run smoke tests on staging
      run: |
        echo "Running smoke tests..."
        # Add smoke test commands here

  # Deploy to production (on main branch)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test, e2e-test, visual-test, performance-test]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here
        
    - name: Run production smoke tests
      run: |
        echo "Running production smoke tests..."
        # Add production smoke test commands here
        
    - name: Notify team of deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        text: '🚀 LipSyncAutomation frontend deployed to production'