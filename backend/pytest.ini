[tool:pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
markers =
    unit: marks tests as unit tests (fast, isolated)
    integration: marks tests as integration tests (slower, may need external services)
    slow: marks tests as slow running
    api: marks tests that require API server
    frontend: marks tests that require frontend
    network: marks tests that require network access
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:websockets.*
    ignore::UserWarning:PIL.*

# Test discovery patterns
collect_ignore = setup.py

# Minimum version
minversion = 6.0

# Logging configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage configuration (if using pytest-cov)
# addopts = --cov=lipsync_automation --cov-report=html --cov-report=term-missing

# Timeout configuration (if using pytest-timeout)
# timeout = 300

# Asyncio configuration (if using pytest-asyncio)
# asyncio_mode = auto