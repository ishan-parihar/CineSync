version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lipsync_backend
    ports:
      - "8001:8500"
    volumes:
      - ./backend:/app
      - ./profiles:/app/profiles
      - ./cache:/app/cache
      - ./output:/app/output
      - ./uploads:/app/uploads
      - ./shared:/app/shared
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    networks:
      - lipsync_network
    restart: unless-stopped
    command: ["python", "app/main.py"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lipsync_frontend
    ports:
      - "5000:3000"
    depends_on:
      - backend
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:8500
    networks:
      - lipsync_network
    restart: unless-stopped
    # Note: This setup is for development; for production, the frontend would be built and served differently

networks:
  lipsync_network:
    driver: bridge

volumes:
  profiles_data:
  cache_data:
  output_data:
  uploads: